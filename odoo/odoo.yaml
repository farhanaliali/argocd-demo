apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odoo
  template:
    metadata:
      labels:
        app: odoo
    spec:
      containers:
        - name: odoo
          image: odoo
          ports:
            - containerPort: 8069
          env:
            - name: HOST
              value: 192.168.70.202
            - name: PASSWORD
              value:  test@123
            - name: USER
              value: test

